<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <style>
        body {
            width: 220px;
            font-family: Arial, sans-serif;
            padding: 15px;
            text-align: center;
            background: #f8fafc;
            color: #1e293b;
        }
        h3 {
            margin-top: 0;
            color: #da251d;
        }
        button {
            padding: 10px;
            width: 100%;
            background: #10b981;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            font-size: 14px;
            box-shadow: 0 2px 4px rgba(16, 185, 129, 0.2);
            transition: background 0.2s;
        }
        button:hover {
            background: #059669;
        }
        button:disabled {
            background: #cbd5e1;
            box-shadow: none;
            cursor: not-allowed;
        }
        #status {
            margin-top: 12px;
            font-size: 13px;
            font-weight: 500;
        }
    </style>
</head>
<body>
    <h3>🎙️ ThôngDVC Assistant</h3>
    <button id="btn-toggle">Bắt đầu nói</button>
    <div id="status">Chưa kết nối</div>

    <script src="webrtc-client.bundle.js"></script>
    <script src="popup.js"></script>
</body>
</html>
