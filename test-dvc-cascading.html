<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trang mô phỏng Dịch vụ công Quốc gia</title>
    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: #f1f5f9;
            color: #1e293b;
            padding: 30px;
            margin: 0;
            display: flex;
            justify-content: center;
        }
        .container {
            background: #ffffff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            width: 500px;
        }
        h2 {
            margin-top: 0;
            color: #0f172a;
            border-bottom: 2px solid #e2e8f0;
            padding-bottom: 12px;
        }
        .header-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            background: #f8fafc;
            padding: 12px 16px;
            border-radius: 8px;
            border: 1px solid #e2e8f0;
        }
        .btn-login {
            background-color: #10b981;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            transition: background 0.2s;
        }
        .btn-login:hover {
            background-color: #059669;
        }
        .user-info {
            color: #1e293b;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .form-group {
            margin-bottom: 18px;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        label {
            font-weight: 600;
            font-size: 14px;
            color: #475569;
        }
        input, select {
            padding: 10px;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            font-size: 14px;
            background: #f8fafc;
            transition: all 0.2s;
        }
        input:focus, select:focus {
            outline: none;
            border-color: #10b981;
            box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.1);
        }
        .btn-submit {
            background-color: #2563eb;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            font-size: 15px;
            width: 100%;
            transition: background 0.2s;
            margin-top: 10px;
        }
        .btn-submit:hover {
            background-color: #1d4ed8;
        }
        .badge {
            background-color: #dbeafe;
            color: #1e40af;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header login mock -->
        <div class="header-bar">
            <div>
                <span class="badge">dichvucong.gov.vn / Mô phỏng</span>
            </div>
            <!-- Toggle Login state -->
            <div id="login-container">
                <button class="btn-login" id="btn-login">Đăng nhập</button>
            </div>
        </div>

        <h2>Tờ khai đăng ký thường trú trực tuyến</h2>
        
        <form id="dvc-form" onsubmit="event.preventDefault(); alert('Nộp hồ sơ thành công!');">
            <div class="form-group">
                <label for="fullname">Họ và tên người nộp (*):</label>
                <input type="text" id="fullname" placeholder="Nhập họ và tên">
            </div>

            <div class="form-group">
                <label for="birthday">Ngày tháng năm sinh (*):</label>
                <input type="text" id="birthday" placeholder="DD/MM/YYYY">
            </div>

            <div class="form-group">
                <label for="cccd-num">Số định danh/CCCD (*):</label>
                <input type="text" id="cccd-num" placeholder="Số định danh/CCCD">
            </div>

            <div class="form-group">
                <label for="phone">Số điện thoại liên hệ (*):</label>
                <input type="text" id="phone" placeholder="Nhập số điện thoại">
            </div>

            <div class="form-group">
                <label for="prov">Tỉnh/Thành phố (*):</label>
                <select id="prov">
                    <option value="">-- Chọn Tỉnh/Thành phố --</option>
                    <option value="01">Thành phố Hà Nội</option>
                    <option value="79">Thành phố Hồ Chí Minh</option>
                </select>
            </div>

            <div class="form-group">
                <label for="dist">Quận/Huyện (*):</label>
                <select id="dist">
                    <option value="">-- Chọn Quận/Huyện --</option>
                </select>
            </div>

            <div class="form-group">
                <label for="ward">Xã/Phường (*):</label>
                <select id="ward">
                    <option value="">-- Chọn Xã/Phường --</option>
                </select>
            </div>

            <div class="form-group">
                <label for="address">Địa chỉ chi tiết (*):</label>
                <input type="text" id="address" placeholder="Số nhà, đường phố, thôn xóm...">
            </div>

            <button type="submit" class="btn-submit" id="btn-submit">Nộp hồ sơ thường trú</button>
        </form>
    </div>

    <script>
        // Simulating logged-out by default. 
        // When clicking login, transition to logged-in
        const loginContainer = document.getElementById("login-container");
        document.getElementById("btn-login").addEventListener("click", () => {
            loginContainer.innerHTML = `
                <div class="user-info">
                    <span>👤</span> <span id="username-display">Nguyễn Văn Hùng</span>
                </div>
            `;
        });

        // AJAX cascading dropdown simulation data
        const mockDistricts = {
            "01": [{ value: "0101", text: "Quận Cầu Giấy" }, { value: "0102", text: "Quận Hoàn Kiếm" }],
            "79": [{ value: "7901", text: "Quận 1" }, { value: "7902", text: "Quận 3" }]
        };
        const mockWards = {
            "0101": [{ value: "010101", text: "Phường Dịch Vọng Hậu" }, { value: "010102", text: "Phường Quan Hoa" }],
            "7901": [{ value: "790101", text: "Phường Bến Nghé" }, { value: "790102", text: "Phường Đa Kao" }]
        };

        const provSelect = document.getElementById("prov");
        const distSelect = document.getElementById("dist");
        const wardSelect = document.getElementById("ward");

        provSelect.addEventListener("change", function() {
            // Clear children
            distSelect.innerHTML = '<option value="">-- Đang tải Quận/Huyện --</option>';
            wardSelect.innerHTML = '<option value="">-- Chọn Xã/Phường --</option>';
            
            const val = this.value;
            if (mockDistricts[val]) {
                // Simulating 600ms latency for AJAX
                setTimeout(() => {
                    distSelect.innerHTML = '<option value="">-- Chọn Quận/Huyện --</option>';
                    mockDistricts[val].forEach(item => {
                        const opt = document.createElement("option");
                        opt.value = item.value;
                        opt.text = item.text;
                        distSelect.add(opt);
                    });
                }, 600);
            } else {
                distSelect.innerHTML = '<option value="">-- Chọn Quận/Huyện --</option>';
            }
        });

        distSelect.addEventListener("change", function() {
            wardSelect.innerHTML = '<option value="">-- Đang tải Xã/Phường --</option>';
            
            const val = this.value;
            if (mockWards[val]) {
                // Simulating 600ms latency for AJAX
                setTimeout(() => {
                    wardSelect.innerHTML = '<option value="">-- Chọn Xã/Phường --</option>';
                    mockWards[val].forEach(item => {
                        const opt = document.createElement("option");
                        opt.value = item.value;
                        opt.text = item.text;
                        wardSelect.add(opt);
                    });
                }, 600);
            } else {
                wardSelect.innerHTML = '<option value="">-- Chọn Xã/Phường --</option>';
            }
        });
    </script>
</body>
</html>
